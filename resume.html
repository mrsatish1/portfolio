<!-- ANIMATION SCRIPT -->
<script>
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".card, .hero").forEach(el => {
    observer.observe(el);
});
</script>
